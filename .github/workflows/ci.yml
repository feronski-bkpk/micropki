name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
    
    - name: Install dependencies
      run: |
        go mod download
        sudo apt-get update
        sudo apt-get install -y openssl curl
    
    - name: Build
      run: make build
    
    - name: Run unit tests with coverage
      run: |
        go test -v -coverprofile=coverage.out ./...
        go tool cover -func=coverage.out
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.out
        flags: unittests
    
    - name: Run integration tests
      run: make test-all
    
    - name: Run performance tests
      run: go test -v -run TestPerformance -timeout 10m ./tests/
    
    - name: Run demo script
      run: |
        chmod +x demo.sh
        ./demo.sh ./micropki-cli
    
    - name: Check audit integrity
      run: |
        ./micropki-cli audit verify
    
    - name: Run linting
      run: |
        go fmt ./...
        go vet ./...
    
  release:
    name: Create Release
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
    
    - name: Build binaries
      run: |
        make build
        mkdir -p dist
        cp micropki-cli dist/
        cp demo.sh dist/
        cp README.md dist/
        cp -r docs dist/
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*
        draft: false
        prerelease: false
        generate_release_notes: true